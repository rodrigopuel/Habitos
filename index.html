<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hábitos">
<meta name="theme-color" content="#0C0F1A">
<title>Hábitos · Rodrigo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: #0C0F1A;
    color: #E8E4DC;
    font-family: Georgia, serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 80px;
    overflow-x: hidden;
  }
  button { cursor: pointer; font-family: Georgia, serif; }

  /* NAV */
  #nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: #0E1122;
    border-top: 1px solid #1E2235;
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1; padding: 12px 4px 10px;
    background: none; border: none;
    color: #4B5563; font-size: 10px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: color 0.15s;
  }
  .nav-btn.active { color: #E8E4DC; }
  .nav-btn .nav-icon { font-size: 20px; line-height: 1; }

  /* HEADER */
  #header {
    padding: 52px 18px 0;
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 20px;
  }
  #header .label { color: #4B5563; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; font-family: sans-serif; margin-bottom: 3px; }
  #header h1 { font-size: 24px; font-weight: normal; letter-spacing: -0.5px; }

  /* VIEWS */
  .view { display: none; padding: 0 18px; }
  .view.active { display: block; }

  /* SECTION LABEL */
  .sec-label { font-size: 11px; color: #4B5563; font-family: sans-serif; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }

  /* WEEK STRIP */
  #week-strip { display: flex; gap: 5px; margin-bottom: 20px; }
  .strip-day {
    flex: 1; border-radius: 10px; padding: 7px 3px; text-align: center;
    cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
  }
  .strip-day.selected { background: #1A1D2E; border-color: #2D3348; }
  .strip-day.future { opacity: 0.25; pointer-events: none; }
  .strip-day .day-name { font-size: 9px; color: #6B7280; font-family: sans-serif; margin-bottom: 5px; }
  .strip-day.today .day-name { color: #F59E0B; }
  .strip-ring {
    width: 26px; height: 26px; border-radius: 50%; margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-family: sans-serif; background: #1E2235; color: #374151;
  }

  /* DAILY CARD */
  .day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .day-title { font-size: 22px; letter-spacing: -0.5px; }
  .day-sub { color: #6B7280; font-size: 13px; font-family: sans-serif; margin-top: 2px; }

  .habit-row {
    display: flex; align-items: center; gap: 13px;
    border-radius: 13px; padding: 14px 16px; margin-bottom: 9px;
    cursor: pointer; border: 1px solid #1E2235;
    background: #0F1120; transition: all 0.18s;
    user-select: none; -webkit-user-select: none;
  }
  .habit-row.checked { background: #161929; }
  .habit-row.future { opacity: 0.4; pointer-events: none; }
  .habit-check {
    width: 24px; height: 24px; border-radius: 7px; flex-shrink: 0;
    border: 2px solid #2D3348; background: transparent;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; font-size: 13px; font-weight: bold; color: #0C0F1A;
  }
  .habit-icon { font-size: 20px; }
  .habit-label { font-size: 14px; color: #9CA3AF; font-family: sans-serif; }
  .habit-row.checked .habit-label { color: #E8E4DC; }
  .habit-streak { font-size: 11px; font-family: sans-serif; margin-top: 2px; }

  /* WEEKLY GRID */
  .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .week-nav-btn { background: #1A1D2E; border: 1px solid #252840; color: #9CA3AF; border-radius: 8px; padding: 6px 14px; font-size: 18px; }
  .week-nav-btn:disabled { color: #2D3348; }
  .week-nav-center { text-align: center; }
  .week-nav-title { font-size: 15px; font-family: sans-serif; }
  .week-nav-sub { font-size: 12px; color: #6B7280; font-family: sans-serif; }

  .wgrid { display: grid; grid-template-columns: 76px repeat(7, 1fr); gap: 4px; }
  .wgrid-head { margin-bottom: 6px; }
  .wgrid-head .col-day { text-align: center; }
  .col-day .cd-name { font-size: 10px; color: #6B7280; font-family: sans-serif; letter-spacing: 0.5px; }
  .col-day.today .cd-name { color: #F59E0B; }
  .col-day .cd-num { font-size: 12px; color: #9CA3AF; font-family: sans-serif; }
  .col-day.today .cd-num { color: #F59E0B; }
  .col-day.future .cd-num { color: #374151; }

  .wrow-label { display: flex; align-items: center; gap: 5px; padding-right: 4px; }
  .wrow-label .rl-icon { font-size: 15px; }
  .wrow-label .rl-name { font-size: 10px; color: #9CA3AF; font-family: sans-serif; line-height: 1.2; }
  .wrow-label .rl-count { font-size: 10px; font-family: sans-serif; }

  .wcell {
    height: 34px; border-radius: 8px; background: #111422;
    border: 1px solid #1E2235;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; font-size: 13px;
  }
  .wcell.future { opacity: 0.25; pointer-events: none; }
  .wcell .dot { color: #2D3348; font-size: 10px; }

  .wtotal-row { margin-top: 8px; }
  .wtotal-cell {
    height: 26px; border-radius: 7px; background: #1A1D2E;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-family: sans-serif; font-weight: 600; color: #4B5563;
  }
  .wtotal-cell.future { background: transparent; }

  /* Goals bars */
  .goals-list { display: flex; flex-direction: column; gap: 8px; margin-top: 18px; }
  .goal-item {}
  .goal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .goal-name { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #9CA3AF; font-family: sans-serif; }
  .goal-count { font-size: 11px; font-family: sans-serif; }
  .goal-bar-bg { height: 5px; border-radius: 3px; background: #1A1D2E; overflow: hidden; }
  .goal-bar { height: 100%; border-radius: 3px; transition: width 0.4s ease; }

  /* Streaks */
  .streaks { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 18px; }
  .streak-chip {
    background: #111422; border: 1px solid #1E2235;
    border-radius: 10px; padding: 8px 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .streak-chip .sc-icon { font-size: 16px; }
  .streak-chip .sc-name { font-size: 11px; color: #9CA3AF; font-family: sans-serif; }
  .streak-chip .sc-val { font-size: 14px; color: #374151; }

  /* MONTHLY VIEW */
  .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .month-nav-title { font-size: 18px; letter-spacing: -0.3px; }
  .month-nav-sub { font-size: 12px; color: #6B7280; font-family: sans-serif; margin-top: 2px; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 24px; }
  .cal-head { text-align: center; font-size: 10px; color: #4B5563; font-family: sans-serif; padding: 4px 0; letter-spacing: 0.5px; }
  .cal-day {
    aspect-ratio: 1; border-radius: 8px; background: #111422; border: 1px solid #1E2235;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-family: sans-serif; color: #6B7280;
    cursor: pointer; transition: all 0.15s; flex-direction: column; gap: 1px;
  }
  .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-day.today { border-color: #F59E0B44; color: #F59E0B; }
  .cal-day.future { opacity: 0.3; pointer-events: none; }
  .cal-day .cal-dot { width: 4px; height: 4px; border-radius: 50%; }

  /* Weekly breakdown in monthly */
  .month-weeks { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
  .mweek-card { background: #111422; border: 1px solid #1E2235; border-radius: 14px; padding: 14px 16px; }
  .mweek-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .mweek-label { font-size: 13px; font-family: sans-serif; color: #E8E4DC; }
  .mweek-pct { font-size: 13px; font-family: sans-serif; }
  .mweek-bars { display: flex; flex-direction: column; gap: 6px; }
  .mweek-bar-row { display: flex; align-items: center; gap: 8px; }
  .mweek-bar-label { font-size: 10px; font-family: sans-serif; color: #6B7280; width: 32px; flex-shrink: 0; }
  .mweek-bar-bg { flex: 1; height: 6px; border-radius: 3px; background: #1A1D2E; overflow: hidden; }
  .mweek-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .mweek-bar-val { font-size: 10px; font-family: sans-serif; color: #6B7280; width: 24px; text-align: right; flex-shrink: 0; }

  /* Monthly habit summary */
  .month-habit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .mhc { background: #111422; border: 1px solid #1E2235; border-radius: 12px; padding: 12px 14px; }
  .mhc-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .mhc-icon { font-size: 18px; }
  .mhc-name { font-size: 12px; font-family: sans-serif; color: #9CA3AF; }
  .mhc-nums { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .mhc-count { font-size: 22px; letter-spacing: -1px; }
  .mhc-goal { font-size: 11px; color: #4B5563; font-family: sans-serif; }
  .mhc-bar-bg { height: 4px; border-radius: 2px; background: #1A1D2E; overflow: hidden; }
  .mhc-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

  /* Backup */
  .backup-row { display: flex; gap: 8px; margin-top: 20px; }
  .backup-btn {
    flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #252840;
    background: #111422; color: #9CA3AF; font-size: 12px; font-family: sans-serif;
  }
  .backup-btn:active { background: #1A1D2E; }

  /* Toast */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #1E2235; border: 1px solid #2D3348; border-radius: 10px;
    padding: 10px 20px; font-size: 13px; font-family: sans-serif; color: #E8E4DC;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 200;
  }
  #toast.show { opacity: 1; }

  /* Ring SVG helper */
  .ring-wrap { flex-shrink: 0; }
</style>
</head>
<body>

<div id="header">
  <div>
    <div class="label">Rodrigo</div>
    <h1>Hábitos</h1>
  </div>
</div>

<!-- DAILY VIEW -->
<div id="view-daily" class="view active">
  <div id="week-strip"></div>
  <div id="daily-content"></div>
</div>

<!-- WEEKLY VIEW -->
<div id="view-weekly" class="view">
  <div id="weekly-content"></div>
</div>

<!-- MONTHLY VIEW -->
<div id="view-monthly" class="view">
  <div id="monthly-content"></div>
</div>

<!-- BOTTOM NAV -->
<nav id="nav">
  <button class="nav-btn active" data-view="daily" onclick="switchView('daily')">
    <span class="nav-icon">☀️</span>Hoje
  </button>
  <button class="nav-btn" data-view="weekly" onclick="switchView('weekly')">
    <span class="nav-icon">📅</span>Semana
  </button>
  <button class="nav-btn" data-view="monthly" onclick="switchView('monthly')">
    <span class="nav-icon">📊</span>Mês
  </button>
</nav>

<div id="toast"></div>

<script>
const HABITS = [
  { id: "acordar",     icon: "☀️", label: "Acordar 6h",  color: "#F59E0B", short: "6h",    goal: 7 },
  { id: "leitura",     icon: "📖", label: "Leitura",      color: "#818CF8", short: "Leit",  goal: 6 },
  { id: "sono",        icon: "🌙", label: "Sono 7–7,5h", color: "#38BDF8", short: "Sono",  goal: 6 },
  { id: "tenis",       icon: "🎾", label: "Tênis",        color: "#34D399", short: "Tênis", goal: 3 },
  { id: "academia",    icon: "🏋️", label: "Academia",     color: "#FB923C", short: "Acad",  goal: 3 },
  { id: "corrida",     icon: "🏃", label: "Corrida",      color: "#E879F9", short: "Corr",  goal: 2 },
  { id: "alimentacao", icon: "🥗", label: "Alimentação",  color: "#F472B6", short: "Alim",  goal: 6 },
];
const DAYS_PT   = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const MONTHS_PT = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const MONTHS_SHORT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

// ── STATE ──────────────────────────────────────────────────────
let data = {};
try { data = JSON.parse(localStorage.getItem("rodrigo_habitos") || "{}"); } catch {}

let selectedDate = toKey(new Date());
let weekOffset   = 0;
let monthOffset  = 0;
let currentView  = "daily";

function toKey(d) { return d.toISOString().split("T")[0]; }
function todayKey() { return toKey(new Date()); }

function save() { localStorage.setItem("rodrigo_habitos", JSON.stringify(data)); }

function isChecked(hid, date) { return !!(data[date] && data[date][hid]); }

function toggle(hid, date) {
  if (!data[date]) data[date] = {};
  data[date][hid] = !data[date][hid];
  save();
  render();
}

function dayScore(date) { return HABITS.filter(h => isChecked(h.id, date)).length; }

function getWeekDates(offset) {
  const today = new Date();
  const start = new Date(today);
  start.setDate(today.getDate() - today.getDay() + offset * 7);
  start.setHours(0,0,0,0);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(start); d.setDate(start.getDate()+i);
    return toKey(d);
  });
}

function habitWeekCount(hid, dates) { return dates.filter(d => isChecked(hid, d)).length; }

function weekGoalPct(dates) {
  const achieved = HABITS.reduce((s,h) => s + Math.min(habitWeekCount(h.id, dates), h.goal), 0);
  const total    = HABITS.reduce((s,h) => s + h.goal, 0);
  return Math.round(achieved / total * 100);
}

function streak(hid) {
  let count = 0;
  const d = new Date();
  while(true) {
    const k = toKey(d);
    if (data[k] && data[k][hid]) { count++; d.setDate(d.getDate()-1); }
    else break;
  }
  return count;
}

// ── RENDER HELPERS ─────────────────────────────────────────────
function ring(pct, size, strokeW, color) {
  const r = (size-strokeW)/2;
  const circ = 2*Math.PI*r;
  const fill = pct/100*circ;
  const cx = size/2, cy = size/2;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="ring-wrap">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1E2235" stroke-width="${strokeW}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${strokeW}"
      stroke-dasharray="${fill} ${circ}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
    <text x="${cx}" y="${cy+4}" text-anchor="middle" fill="#E8E4DC" font-size="${size*0.22}" font-family="Georgia">${pct}%</text>
  </svg>`;
}

// ── DAILY ──────────────────────────────────────────────────────
function renderDaily() {
  const today = todayKey();
  const weekDates = getWeekDates(0);

  // Strip
  let stripHtml = "";
  weekDates.forEach((date, i) => {
    const score = dayScore(date);
    const isT   = date === today;
    const isSel = date === selectedDate;
    const isFut = date > today;
    const pct   = score / HABITS.length;
    const bg    = score > 0 ? `conic-gradient(#34D399 ${pct*360}deg, #1E2235 0deg)` : "#1E2235";
    stripHtml += `<div class="strip-day${isT?" today":""}${isSel?" selected":""}${isFut?" future":""}"
      onclick="selectDate('${date}')">
      <div class="day-name">${DAYS_PT[i]}</div>
      <div class="strip-ring" style="background:${bg}">${isFut?"":score}</div>
    </div>`;
  });
  document.getElementById("week-strip").innerHTML = stripHtml;

  // Day content
  const score   = dayScore(selectedDate);
  const pct     = Math.round(score / HABITS.length * 100);
  const isToday = selectedDate === today;
  const dateObj = new Date(selectedDate + "T12:00:00");
  const ringCol = pct===100 ? "#F59E0B" : "#34D399";

  let habitsHtml = "";
  HABITS.forEach(h => {
    const checked = isChecked(h.id, selectedDate);
    const s       = streak(h.id);
    const isFut   = selectedDate > today;
    habitsHtml += `
      <div class="habit-row${checked?" checked":""}${isFut?" future":""}"
        onclick="toggle('${h.id}','${selectedDate}')">
        <div class="habit-check" style="${checked?`border-color:${h.color};background:${h.color}`:`border-color:#2D3348`}">
          ${checked?"✓":""}
        </div>
        <span class="habit-icon">${h.icon}</span>
        <div style="flex:1">
          <div class="habit-label">${h.label}</div>
          ${s>1?`<div class="habit-streak" style="color:${h.color}">🔥 ${s} dias seguidos</div>`:""}
        </div>
      </div>`;
  });

  document.getElementById("daily-content").innerHTML = `
    <div class="day-header">
      <div>
        <div class="day-title">${isToday?"Hoje":DAYS_PT[dateObj.getDay()]}</div>
        <div class="day-sub">${dateObj.getDate()} de ${MONTHS_PT[dateObj.getMonth()]}</div>
      </div>
      ${ring(pct, 56, 6, ringCol)}
    </div>
    ${habitsHtml}`;
}

// ── WEEKLY ─────────────────────────────────────────────────────
function renderWeekly() {
  const today     = todayKey();
  const weekDates = getWeekDates(weekOffset);
  const pct       = weekGoalPct(weekDates);

  // label
  const start = new Date(weekDates[0]+"T12:00:00");
  const end   = new Date(weekDates[6]+"T12:00:00");
  let wLabel  = weekOffset===0 ? "Esta semana" : weekOffset===-1 ? "Semana passada"
    : `${start.getDate()} ${MONTHS_SHORT[start.getMonth()]} – ${end.getDate()} ${MONTHS_SHORT[end.getMonth()]}`;

  // Grid header
  let headCols = `<div></div>`;
  weekDates.forEach((date,i) => {
    const isT   = date===today;
    const isFut = date>today;
    const dObj  = new Date(date+"T12:00:00");
    headCols += `<div class="col-day${isT?" today":""}${isFut?" future":""}">
      <div class="cd-name">${DAYS_PT[i]}</div>
      <div class="cd-num">${dObj.getDate()}</div>
    </div>`;
  });

  // Habit rows
  let habitRows = "";
  HABITS.forEach(h => {
    const wc = habitWeekCount(h.id, weekDates);
    const col = wc>=h.goal ? "#34D399" : wc>=Math.ceil(h.goal/2) ? h.color : "#6B7280";
    let cells = `<div class="wrow-label">
      <span class="rl-icon">${h.icon}</span>
      <div>
        <div class="rl-name">${h.short}</div>
        <div class="rl-count" style="color:${col}">${wc}/${h.goal}${wc>=h.goal?" ✓":""}</div>
      </div>
    </div>`;
    weekDates.forEach(date => {
      const checked = isChecked(h.id, date);
      const isFut   = date>today;
      cells += `<div class="wcell${isFut?" future":""}"
        style="${checked?`background:${h.color}33;border-color:${h.color}66`:""}"
        onclick="toggle('${h.id}','${date}')">
        ${checked ? `<span style="color:${h.color}">✓</span>` : isFut?"":"<span class='dot'>·</span>"}
      </div>`;
    });
    habitRows += `<div class="wgrid" style="margin-bottom:4px">${cells}</div>`;
  });

  // Total row
  let totalCells = `<div style="font-size:10px;color:#4B5563;font-family:sans-serif;align-self:center">Total</div>`;
  weekDates.forEach(date => {
    const sc    = dayScore(date);
    const isFut = date>today;
    const p     = sc/HABITS.length;
    const bg    = p===1?"#F59E0B22":p>=0.6?"#34D39922":"#1A1D2E";
    const col2  = p===1?"#F59E0B":p>=0.6?"#34D399":"#4B5563";
    totalCells += `<div class="wtotal-cell${isFut?" future":""}" style="${isFut?"":`;background:${bg};color:${col2}`}">${isFut?"":sc}</div>`;
  });

  // Goals bars
  let goalBars = "";
  HABITS.forEach(h => {
    const count = habitWeekCount(h.id, weekDates);
    const p     = Math.min(count/h.goal,1);
    const done  = count>=h.goal;
    goalBars += `<div class="goal-item">
      <div class="goal-top">
        <div class="goal-name"><span>${h.icon}</span>${h.label}</div>
        <span class="goal-count" style="color:${done?"#34D399":h.color}">${count}/${h.goal}x${done?" ✓":""}</span>
      </div>
      <div class="goal-bar-bg"><div class="goal-bar" style="width:${p*100}%;background:${done?"#34D399":h.color}"></div></div>
    </div>`;
  });

  // Streaks
  let streakChips = "";
  HABITS.forEach(h => {
    const s = streak(h.id);
    streakChips += `<div class="streak-chip" style="${s>0?`background:${h.color}22;border-color:${h.color}55`:""}">
      <span class="sc-icon">${h.icon}</span>
      <div>
        <div class="sc-name">${h.short}</div>
        <div class="sc-val" style="color:${s>0?h.color:"#374151"}">${s>0?`🔥 ${s}d`:"—"}</div>
      </div>
    </div>`;
  });

  document.getElementById("weekly-content").innerHTML = `
    <div class="week-nav">
      <button class="week-nav-btn" onclick="changeWeek(-1)">‹</button>
      <div class="week-nav-center">
        <div class="week-nav-title">${wLabel}</div>
        <div class="week-nav-sub">${pct}% das metas</div>
      </div>
      <button class="week-nav-btn" ${weekOffset===0?"disabled":""} onclick="changeWeek(1)">›</button>
    </div>
    <div class="wgrid wgrid-head">${headCols}</div>
    ${habitRows}
    <div class="wgrid" style="margin-top:8px">${totalCells}</div>
    <div style="margin-top:20px">
      <div class="sec-label">Metas da semana</div>
      <div class="goals-list">${goalBars}</div>
    </div>
    <div style="margin-top:20px">
      <div class="sec-label">Sequências</div>
      <div class="streaks">${streakChips}</div>
    </div>`;
}

// ── MONTHLY ────────────────────────────────────────────────────
function getMonthWeeks(year, month) {
  // Returns array of week arrays [{date, inMonth}]
  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month+1, 0);
  const weeks    = [];
  const start    = new Date(firstDay);
  start.setDate(1 - firstDay.getDay()); // go back to Sunday
  while(start <= lastDay || start.getDay() !== 0) {
    const week = [];
    for(let i=0;i<7;i++) {
      week.push({ date: toKey(new Date(start)), inMonth: start.getMonth()===month });
      start.setDate(start.getDate()+1);
    }
    weeks.push(week);
    if(start > lastDay && start.getDay()===0) break;
  }
  return weeks;
}

function renderMonthly() {
  const today   = todayKey();
  const now     = new Date();
  const year    = now.getFullYear();
  const month   = ((now.getMonth() + monthOffset) % 12 + 12) % 12;
  const yearAdj = year + Math.floor((now.getMonth() + monthOffset) / 12);

  const weeks = getMonthWeeks(yearAdj, month);

  // Calendar grid
  let calHtml = DAYS_PT.map(d => `<div class="cal-head">${d}</div>`).join("");
  weeks.forEach(week => {
    week.forEach(({date, inMonth}) => {
      if(!inMonth) { calHtml += `<div class="cal-day empty"></div>`; return; }
      const sc    = dayScore(date);
      const isT   = date===today;
      const isFut = date>today;
      const p     = sc/HABITS.length;
      const dotCol = p===1?"#F59E0B":p>=0.6?"#34D399":p>0?"#818CF8":"transparent";
      const dObj  = new Date(date+"T12:00:00");
      calHtml += `<div class="cal-day${isT?" today":""}${isFut?" future":""}"
        style="${sc>0&&!isFut?`background:${p===1?"#F59E0B11":"#111422"};border-color:${p===1?"#F59E0B44":"#1E2235"}`:""}">
        <span>${dObj.getDate()}</span>
        ${!isFut?`<div class="cal-dot" style="background:${dotCol}"></div>`:""}
      </div>`;
    });
  });

  // Weekly breakdown cards
  let weekCards = "";
  weeks.forEach((week, wi) => {
    const weekDatesInMonth = week.filter(d => d.inMonth && d.date <= today).map(d => d.date);
    if(weekDatesInMonth.length === 0) return;
    const allDates = week.map(d=>d.date);
    const wPct = weekGoalPct(allDates);
    const wStart = new Date(weekDatesInMonth[0]+"T12:00:00");
    const wEnd   = new Date(weekDatesInMonth[weekDatesInMonth.length-1]+"T12:00:00");
    const wLabel = `${wStart.getDate()}–${wEnd.getDate()} ${MONTHS_SHORT[month]}`;
    const pctCol = wPct>=80?"#34D399":wPct>=50?"#F59E0B":"#F472B6";

    let barRows = "";
    HABITS.forEach(h => {
      const count = habitWeekCount(h.id, allDates);
      const p     = Math.min(count/h.goal,1);
      barRows += `<div class="mweek-bar-row">
        <div class="mweek-bar-label">${h.short}</div>
        <div class="mweek-bar-bg"><div class="mweek-bar-fill" style="width:${p*100}%;background:${count>=h.goal?"#34D399":h.color}"></div></div>
        <div class="mweek-bar-val">${count}/${h.goal}</div>
      </div>`;
    });

    weekCards += `<div class="mweek-card">
      <div class="mweek-top">
        <div class="mweek-label">Semana ${wi+1} · ${wLabel}</div>
        <div class="mweek-pct" style="color:${pctCol}">${wPct}%</div>
      </div>
      <div class="mweek-bars">${barRows}</div>
    </div>`;
  });

  // Monthly habit totals
  // Count all days in month up to today
  const daysInMonth = new Date(yearAdj, month+1, 0).getDate();
  const allMonthDates = Array.from({length:daysInMonth}, (_,i) => {
    const d = new Date(yearAdj, month, i+1);
    return toKey(d);
  }).filter(d => d <= today);

  let habitCards = "";
  HABITS.forEach(h => {
    const count   = allMonthDates.filter(d => isChecked(h.id,d)).length;
    const weeksInMonth = Math.ceil(daysInMonth/7);
    const monthGoal = h.goal * weeksInMonth;
    const p = Math.min(count/monthGoal, 1);
    habitCards += `<div class="mhc">
      <div class="mhc-top">
        <span class="mhc-icon">${h.icon}</span>
        <span class="mhc-name">${h.label}</span>
      </div>
      <div class="mhc-nums">
        <span class="mhc-count" style="color:${h.color}">${count}</span>
        <span class="mhc-goal">meta ~${monthGoal}x</span>
      </div>
      <div class="mhc-bar-bg"><div class="mhc-bar-fill" style="width:${p*100}%;background:${p>=1?"#34D399":h.color}"></div></div>
    </div>`;
  });

  // Backup
  const backupHtml = `
    <div class="backup-row">
      <button class="backup-btn" onclick="exportData()">⬇ Exportar backup</button>
      <button class="backup-btn" onclick="importData()">⬆ Importar backup</button>
    </div>`;

  document.getElementById("monthly-content").innerHTML = `
    <div class="month-nav">
      <button class="week-nav-btn" onclick="changeMonth(-1)">‹</button>
      <div>
        <div class="month-nav-title">${MONTHS_PT[month]}</div>
        <div class="month-nav-sub">${yearAdj}</div>
      </div>
      <button class="week-nav-btn" ${monthOffset===0?"disabled":""} onclick="changeMonth(1)">›</button>
    </div>

    <div class="sec-label">Calendário</div>
    <div class="cal-grid" style="margin-bottom:24px">${calHtml}</div>

    <div class="sec-label">Por semana</div>
    <div class="month-weeks">${weekCards}</div>

    <div class="sec-label">Resumo do mês</div>
    <div class="month-habit-grid" style="margin-bottom:8px">${habitCards}</div>
    ${backupHtml}`;
}

// ── CONTROLS ───────────────────────────────────────────────────
function switchView(v) {
  currentView = v;
  document.querySelectorAll(".view").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(el => el.classList.remove("active"));
  document.getElementById("view-"+v).classList.add("active");
  document.querySelector(`[data-view="${v}"]`).classList.add("active");
  render();
}

function selectDate(date) {
  selectedDate = date;
  renderDaily();
}

function changeWeek(delta) {
  weekOffset = Math.min(0, weekOffset + delta);
  renderWeekly();
}

function changeMonth(delta) {
  monthOffset = Math.min(0, monthOffset + delta);
  renderMonthly();
}

function render() {
  if(currentView==="daily")   renderDaily();
  if(currentView==="weekly")  renderWeekly();
  if(currentView==="monthly") renderMonthly();
}

// ── BACKUP ─────────────────────────────────────────────────────
function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:"application/json"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = "habitos-backup.json"; a.click();
  URL.revokeObjectURL(url);
  showToast("Backup exportado ✓");
}

function importData() {
  const input = document.createElement("input");
  input.type = "file"; input.accept = ".json";
  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        data = parsed; save(); render();
        showToast("Dados importados ✓");
      } catch { showToast("Arquivo inválido"); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ── BACKUP REMINDER ────────────────────────────────────────────
function checkBackupReminder() {
  const lastBackup = localStorage.getItem("rodrigo_last_backup");
  const now = Date.now();
  const SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;
  if (!lastBackup || (now - parseInt(lastBackup)) > SEVEN_DAYS) {
    setTimeout(() => showBackupModal(), 900);
  }
}

function showBackupModal() {
  document.getElementById("backup-modal").style.display = "flex";
}

function closeBackupModal() {
  document.getElementById("backup-modal").style.display = "none";
  localStorage.setItem("rodrigo_last_backup", Date.now().toString());
}

function exportAndClose() {
  exportData();
  closeBackupModal();
}

// ── INIT ───────────────────────────────────────────────────────
render();
checkBackupReminder();
</script>

      Lembrar semana que vem
    </button>
  </div>
</div>
